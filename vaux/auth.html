<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In or Sign Up | Vaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">Vaux</a>
    <p class="auth-subtitle">Professional websites for HVAC businesses</p>

    <div class="auth-tabs">
      <div class="auth-tab" id="tabSignin">Sign In</div>
      <div class="auth-tab" id="tabSignup">Sign Up</div>
    </div>

    <p class="auth-error" id="authError"></p>

    <form class="auth-form" id="signinForm">
      <input type="email" id="signinEmail" placeholder="Email Address" required>
      <input type="password" id="signinPassword" placeholder="Password" required>
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>

    <form class="auth-form" id="signupForm" style="display:none;">
      <input type="text" id="signupName" placeholder="Your Full Name" required>
      <input type="text" id="signupBusiness" placeholder="HVAC Business Name" required>
      <input type="tel" id="signupPhone" placeholder="Business Phone Number" required>
      <input type="url" id="signupFacebook" placeholder="Facebook Page URL (e.g. facebook.com/yourbiz)" required>
      <input type="email" id="signupEmail" placeholder="Email Address" required>
      <input type="password" id="signupPassword" placeholder="Create a Password" required>
      <select id="signupPlan" required>
        <option value="" disabled selected>Select a Plan</option>
        <option value="starter">Starter — $29/mo</option>
        <option value="growth">Growth — $59/mo (Most Popular)</option>
        <option value="pro">Pro — $99/mo</option>
      </select>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-note">Questions? Email us at <a href="mailto:vauxbuilds@gmail.com" style="color:var(--primary);">vauxbuilds@gmail.com</a></p>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
